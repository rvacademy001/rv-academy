<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo" style="margin-bottom: 20px;">
                <i class="fa-solid fa-chart-line"></i> RV <span>ADMIN</span>
            </div>
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html"><i class="fa-solid fa-chart-pie"></i> Overview</a></li>
                <li><a href="admin-students.html"><i class="fa-solid fa-users"></i> Students DB</a></li>
                <li><a href="admin-courses.html"><i class="fa-solid fa-book"></i> Courses Manager</a></li>
                <li><a href="admin-tickets.html"><i class="fa-solid fa-headset"></i> Support Tickets</a></li>
                <li><a href="admin-cms.html" class="active"><i class="fa-solid fa-pen-nib"></i> Landing Page CMS</a></li>
                <li><a href="admin-settings.html"><i class="fa-solid fa-gear"></i> System Settings</a></li>
                <li style="margin-top: auto; padding-top: 50px;"><a href="index.html" style="color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
            </ul>
        </aside>
        <main class="main-content">
            <header style="margin-bottom: 30px;">
                <h1 style="font-size: 28px;">Landing Page CMS</h1>
                <p style="color: var(--text-muted);">Update home page texts, hero images, and pricing details.</p>
            </header>
            <div class="content-card" style="max-width: 600px;">
                <form onsubmit="event.preventDefault(); alert('Saved successfully!');">
                    <div class="form-group">
                        <label>Hero Title</label>
                        <input type="text" class="form-control" value="මුල සිට සරලව සිංහලෙන් Trading ඉගෙන ගනිමු.">
                    </div>
                    <div class="form-group">
                        <label>Silver Tier Price</label>
                        <input type="text" class="form-control" value="Rs. 15,000">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Website</button>
                </form>
            </div>
        </main>
    </div>
    <script src="js/script.js"></script>
