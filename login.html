<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login | RV ACADEMY</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background: url('https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?q=80&w=1920&auto=format&fit=crop') center/cover; position: relative;">

    <div style="position: absolute; inset: 0; background: rgba(11,14,20,0.85); z-index: 0;"></div>

    <nav style="background: transparent; border: none; position: relative; z-index: 1;">
        <div class="container" style="display: flex; justify-content: center; align-items: center; width: 100%;">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-chart-line"></i> RV <span>ACADEMY</span>
            </a>
        </div>
    </nav>

    <div class="container auth-container" style="position: relative; z-index: 1;">
        <div class="auth-card">
            <h2 style="text-align: center; margin-bottom: 30px; font-size: 28px;">Welcome Back!</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="Enter your email (type 'admin' for Admin Panel)" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
                </div>
                
                <div style="display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 14px;">
                    <label style="color: var(--text-muted); cursor: pointer;"><input type="checkbox"> Remember me</label>
                    <a href="#" style="color: var(--primary);">Forgot Password?</a>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">Secure Login <i class="fa-solid fa-arrow-right"></i></button>
            </form>
            
            <p style="text-align: center; margin-top: 25px; color: var(--text-muted);">
                Don't have an account? <a href="course.html" style="color: var(--primary); font-weight: 600;">Buy Course</a>
            </p>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
