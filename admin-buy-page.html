</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="logo" style="margin-bottom: 20px;">
                <i class="fa-solid fa-chart-line"></i> RV <span>ADMIN</span>
            </div>
            
            <ul class="sidebar-menu">
                <li><a href="admin-dashboard.html"><i class="fa-solid fa-chart-pie"></i> Overview</a></li>
                <li><a href="admin-students.html"><i class="fa-solid fa-users"></i> Students DB</a></li>
                <li><a href="admin-courses.html"><i class="fa-solid fa-book"></i> Courses Manager</a></li>
                <li><a href="admin-affiliates.html"><i class="fa-solid fa-handshake"></i> Affiliates & Payouts</a></li>
                <li><a href="admin-gamification.html"><i class="fa-solid fa-medal"></i> Gamification</a></li>
                <li><a href="admin-sales.html"><i class="fa-solid fa-wallet"></i> Sales & Revenue</a></li>

            </ul>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 30px;">
                <h1 style="font-size: 28px;">Buy Page Settings</h1>
                <p style="color: var(--text-muted);">Update the video link shown on the Buy Course page.</p>
            </header>

            <div class="content-card" style="max-width: 600px;">
                <form onsubmit="event.preventDefault(); alert('Buy Page Video Updated Successfully!');">
                    <div class="form-group">
                        <label>Promo Video Link (Google Drive / YouTube embed)</label>
                        <input type="url" class="form-control" placeholder="https://www.youtube.com/embed/..." value="https://www.youtube.com/embed/ScMzIvxBSi4?controls=0&modestbranding=1" required>
                    </div>
                    <div class="form-group">
                        <label>Video Title / Headline</label>
                        <input type="text" class="form-control" value="Join the Elite Trading Community">
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </main>
    </div>
    <script src="js/script.js"></script>
